<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>가고싶은 나라, 보고싶은것들</h3>
    <hr>
    <form>
        가고싶은나라:
        <input type="text" list="countries"><br>
        <datalist id="countries">
        <option value="미국">
        <option value="일본">
        <option value="짱께">
        </datalist>
        
        보고싶은것들:
         <input type="text" list="place"><br>
        <datalist id="place">
        <option value="산">
        <option value="바다">
        <option value="강">
        </datalist>
    </form>
</body>
</html>
