<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고양이가 좋아!</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; color: #333; }
        h2 { color: #2c3e50; }
        mark { background-color: #ffeb3b; padding: 0 2px; }
        ins { text-decoration: underline; color: #e67e22; }
    </style>
</head>
<body>
   <h2>저는 동물을 좋아합니다</h2> 
   <p>그런데 그중에 <strong>고양이</strong>를 특히 좋아해요.</p>
   <hr>
   
   <p>어떤 동물을 좋아하는지 말해줄게요:</p>
   <ul>
        <li>개</li>
        <li>돌고래</li>
        <li>참새</li>
        <li>까치</li>
        <li>고양이
            <ol>
                <li><ins><b>랙돌</b></ins></li>
                <li>샴</li>
                <li><b>라가머핀</b></li>
                <li>러시안블루</li>
                <li><mark>노르웨이숲</mark></li>
                <li><del>호랑이도 고양이 아닌가</del></li>
            </ol>
        </li> <li>족제비</li>
        <li>고슴도치</li>
    </ul>
    
    <hr>
    <p>여러분도 고양이를 좋아하시나요? 🐾</p>
</body>
</html>
