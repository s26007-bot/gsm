<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김민규</title>
</head>
<body>
<header style="background-color: white;"><h1>명함 신청 페이지</h1></header>
<section style="background-color: skyblue;">
    <form>
    <div>
        1. 학년:
        <select name="grade">
            <option value="1">1학년</option>
            <option value="2">2학년</option>
            <option value="3">3학년</option>
        </select>
    </div>

    <div>
        <p>2. 반:
        <select name="class">
            <option value="1">1반</option>
            <option value="2">2반</option>
            <option value="3">3반</option>
            <option value="4">4반</option>
        </select>
        </p>
    </div>

    <div>
        <p>
        3. 번호: <input type="text" name="student_number">
        </p>
    </div>

    <div>
        <p>
        4. 이름: <input type="text" name="student_name">
        </p>
    </div>

    <div>
        <p>
        5. 원하는 시안 번호 선택
        </p>
    </div>

    <img src="https://lh7-rt.googleusercontent.com/formsz/AN7BsVCherQ6yMUjmXW0gCRKc1nZuHfLQV0kwh2n64XaO7WTbSKZLBxS2T-1ne4VtoAT8k6LIcmieNu_M9Mf6iw7wukTLGHW0y3pX21-pIelI0Vv2llcuQYizn-Q3LHjM5uVBhqVYeuuCXrvyjAVyvy2kf5QGYvTdBhMJCVx?key=zXC0opYBWS7IVmphVU1lkQ" width="600" alt="명안시안">

    <div>
        <input type="radio" name="design" value="1안"> 1안
        <input type="radio" name="design" value="2안"> 2안
        <input type="radio" name="design" value="3안"> 3안
        <input type="radio" name="design" value="4안"> 4안
    </div>
    <div>
        <input type="radio" name="design" value="5안"> 5안
        <input type="radio" name="design" value="6안"> 6안
        <input type="radio" name="design" value="7안"> 7안
        <input type="radio" name="design" value="8"> 8안
    </div>

    <div>
        <p>
            6. 내가 명함에 넣고 싶은 항목 선택
        </p>
    </div>

    <div>
        <input type="checkbox" name="item" value="이름"> 이름
        <input type="checkbox" name="item" value="이메일"> 이메일
    </div>

    <div>
        <input type="checkbox" name="item" value="디스코드"> 디스코드 아이디
        <input type="checkbox" name="item" value="깃헙아이디"> 깃헙 아이디
    </div>

    <div>
        <input type="checkbox" name="item" value="관심분야"> 관심분야
        <input type="checkbox" name="item" value="휴대폰번호"> 휴대폰 번호
    </div>

    <div>
        <p>
            7. 기타 건의사항
        </p>
    </div>

    <div>
    <textarea name="건의사항" cols="20" rows="10"></textarea>
    </div>

    <div>
        <p>
            <input type="submit" value="전송하기">
            <button type="reset">초기화하기</button>
        </p>
    </div>
    </form>
</section>

<footer style="background-color: yellow;">
    <h2>QnA</h2>

    <details>
        <summary>언제까지 내요?</summary>
        <p>3월 11일까지 제출합니다</p>
    </details>

    <details>
        <summary>명함 얼마에요?</summary>
        <p>무료입니다</p>
    </details>

    <details>
        <summary>늦게 내면 어떻게돼요?</summary>
        <p>1학년 <ins><b>전원</b></ins>의 명함발급이 늦어집니다</p>
    </details>

</footer>
</body>
</html>
